version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: lifepilot_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - lifepilot-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifepilot_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=lifepilot
    depends_on:
      - mongodb
    networks:
      - lifepilot-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lifepilot_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - lifepilot-network

volumes:
  mongodb_data:

networks:
  lifepilot-network:
    driver: bridge
